services:
  - type: web
    name: ai-startup-builder-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_ACCESS_TOKEN
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: DAILY_GENERATION_LIMIT
        value: "20"
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: LANGSMITH_TRACING
        value: "false"
      - key: LANGCHAIN_PROJECT
        value: ai-startup-builder
      - key: LANGSMITH_PROJECT
        value: ai-startup-builder
      - key: ENABLE_DEBUG_ENV
        value: "false"
      - key: PRIMARY_LLM_MODEL
        value: gpt-4o-mini
      - key: FALLBACK_LLM_MODEL
        value: gpt-4.1-mini
      - key: ENABLE_LLM_FALLBACK
        value: "true"
      - key: LLM_TIMEOUT_SECONDS
        value: "45"

  - type: web
    name: ai-startup-builder-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: ai-startup-builder-backend
          property: hostport
      - key: BACKEND_API_TOKEN
        sync: false
      - key: OBSERVABILITY_ADMIN_TOKEN
        sync: false
      - key: FRONTEND_PASSWORD
        sync: false
